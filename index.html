<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Success - PESPARAWI XIV</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #e0f2ff 0%, #b3d9ff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Decor */
        .bg-accent-bottom {
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: #3b82f6;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
            z-index: 1;
            animation: breathe 7s ease-in-out infinite;
        }

        .bg-accent-top {
            position: absolute;
            top: -12%;
            right: -12%;
            width: 45%;
            height: 45%;
            background: #ffd54a;
            filter: blur(90px);
            opacity: 0.35;
            border-radius: 50%;
            z-index: 1;
            animation: breathe 8s ease-in-out infinite 1s;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.35; }
            50% { transform: scale(1.25); opacity: 0.5; }
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #FFFFFF 50%, #87CEEB 100%);
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            animation: containerFade 0.6s ease-out both;
        }

        @keyframes containerFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @media (min-width: 540px) {
            .container {
                height: 92vh;
                border-radius: 28px;
                box-shadow: 0 20px 60px rgba(12,59,94,0.35);
                overflow: hidden;
            }
        }

        /* Generic entrance animation */
        .fade-up {
            opacity: 0;
            transform: translateY(18px);
            animation: fadeUp 0.7s ease-out forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Section */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .logo-provinsi {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
            opacity: 0;
            animation: popLogo 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
        }

        .mascot {
            width: 90px;
            height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
            opacity: 0;
            animation: popLogo 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s forwards,
                       floatY 3.2s ease-in-out 1s infinite;
        }

        @keyframes popLogo {
            0% { opacity: 0; transform: scale(0.5) rotate(-8deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes floatY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .title-main {
            font-family: 'Montserrat', sans-serif;
            color: #0c3b5e;
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1.2;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            animation-delay: 0.35s;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(to right, transparent, #0c3b5e, transparent);
            margin: 15px 0;
            position: relative;
            animation-delay: 0.45s;
        }

        .divider::after {
            content: "❖";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 5px;
            color: #0c3b5e;
        }

        /* Text Content */
        .subtitle {
            color: #1a4f7a;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
            animation-delay: 0.55s;
        }

        .info-text {
            color: #333;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 30px;
            animation-delay: 0.65s;
        }

        /* Verify Icon Area */
        .verify-wrapper {
            position: relative;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation-delay: 0.75s;
        }

        .check-circle-wrap {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pulse-ring {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid #00c853;
            opacity: 0;
            animation: pulseRing 2.6s cubic-bezier(0.4, 0, 0.6, 1) 1.1s infinite;
        }

        .pulse-ring.delay1 { animation-delay: 1.9s; }
        .pulse-ring.delay2 { animation-delay: 2.7s; }

        @keyframes pulseRing {
            0% { transform: scale(0.82); opacity: 0.55; }
            100% { transform: scale(1.55); opacity: 0; }
        }

        .check-circle {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle at 32% 28%, #2be37c, #00b34a 70%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,168,80,0.45), 0 0 0 8px rgba(255,255,255,0.85);
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: scale(0);
            animation: popIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.85s forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            65% { transform: scale(1.12); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .checkmark-svg {
            width: 78px;
            height: 78px;
            overflow: visible;
        }

        .checkmark-check {
            fill: none;
            stroke: #ffffff;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 42;
            stroke-dashoffset: 42;
            animation: drawCheck 0.5s ease-out 1.35s forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ffd54a;
            opacity: 0;
            animation: sparklePop 1.4s ease-out 1.4s forwards;
        }

        .sparkle:nth-child(1) { top: 6%;  left: 12%; animation-delay: 1.40s; background:#ffd54a; }
        .sparkle:nth-child(2) { top: 12%; left: 86%; animation-delay: 1.50s; background:#ff7e7e; }
        .sparkle:nth-child(3) { top: 78%; left: 90%; animation-delay: 1.60s; background:#5cc6ff; }
        .sparkle:nth-child(4) { top: 86%; left: 16%; animation-delay: 1.70s; background:#ffd54a; }
        .sparkle:nth-child(5) { top: 46%; left: 2%;  animation-delay: 1.80s; background:#5cc6ff; }
        .sparkle:nth-child(6) { top: 40%; left: 96%; animation-delay: 1.90s; background:#ff7e7e; }

        @keyframes sparklePop {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            40% { transform: scale(1.3) translateY(-6px); opacity: 1; }
            100% { transform: scale(0.4) translateY(-18px); opacity: 0; }
        }

        .verified-label {
            margin-top: 20px;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(100deg, #1a4f7a 0%, #0c3b5e 25%, #2e8fd1 50%, #0c3b5e 75%, #1a4f7a 100%);
            background-size: 250% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            opacity: 0;
            transform: translateY(12px);
            animation: labelIn 0.6s ease-out 1.55s forwards, shimmer 4s linear 2.2s infinite;
        }

        @keyframes labelIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: -250% center; }
        }

        @media (max-width: 400px) {
            .title-main { font-size: 1.1rem; }
            .check-circle-wrap, .check-circle, .pulse-ring { width: 130px; height: 130px; }
            .checkmark-svg { width: 64px; height: 64px; }
            .verified-label { font-size: 2rem; }
        }
    </style>
</head>
