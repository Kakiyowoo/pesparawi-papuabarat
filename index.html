<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Success - PESPARAWI XIV</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #e0f2ff 0%, #b3d9ff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Decor */
        .bg-accent-bottom {
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: #3b82f6;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #FFFFFF 50%, #87CEEB 100%);
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Header Section */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .logo-provinsi {
            width: 80px;
            height: auto;
        }

        .mascot {
            width: 90px;
            height: auto;
        }

        .title-main {
            font-family: 'Montserrat', sans-serif;
            color: #0c3b5e;
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1.2;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(to right, transparent, #0c3b5e, transparent);
            margin: 15px 0;
            position: relative;
        }

        .divider::after {
            content: "❖";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 5px;
            color: #0c3b5e;
        }

        /* Text Content */
        .subtitle {
            color: #1a4f7a;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .info-text {
            color: #333;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 30px;
        }

        /* Verify Icon Area */
        .verify-wrapper {
            position: relative;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .check-circle {
            width: 160px;
            height: 160px;
            background-color: #00c853;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,200,83,0.3);
            border: 8px solid rgba(255,255,255,0.8);
        }

        .checkmark {
            width: 80px;
            height: 40px;
            border-left: 12px solid white;
            border-bottom: 12px solid white;
            transform: rotate(-45deg) translate(10px, -5px);
        }

        .verified-label {
            margin-top: 20px;
            font-size: 2.5rem;
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 1.5px #1a4f7a;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        @media (max-width: 400px) {
            .title-main { font-size: 1.1rem; }
            .check-circle { width: 130px; height: 130px; }
            .verified-label { font-size: 2rem; }
        }
    </style>
</head>
